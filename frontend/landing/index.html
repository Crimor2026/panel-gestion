<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Proyectos - ATU</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* =========================
   BODY / FONDO PRINCIPAL
========================= */

body{
margin:0;
min-height:100vh;
position:relative;
overflow-x:hidden;
overflow-y:auto;

background-image:url("/static/landing/fondo.png");
background-repeat:no-repeat;

/* DESKTOP: centrado */
background-position:center 65%;

background-size:cover;
background-color:#0f4c5c;

font-family:sans-serif;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

/* movimiento suave del fondo */
animation:fondoMovimiento 25s ease-in-out infinite;
}


/* =========================
   AJUSTE PARA MÓVIL
========================= */

@media (max-width:768px){

body{

/* mueve el foco hacia el logo ATU */
background-position:70% center;

/* evita que se recorte tanto */
background-size:cover;

/* evita pequeños saltos en móviles */
animation:none;

}

}


/* =========================
   OVERLAY SUAVE
========================= */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
rgba(0,0,0,0.05),
rgba(0,0,0,0.15)
);

pointer-events:none;
z-index:-1;
}


/* =========================
   HALO DETRÁS DEL LOGO
========================= */

body::after{
content:"";
position:fixed;
top:55%;
left:60%;
transform:translate(-50%,-50%);

width:800px;
height:500px;

background:radial-gradient(
circle,
rgba(0,180,255,0.25) 0%,
rgba(0,0,0,0) 70%
);

pointer-events:none;
z-index:-1;
}


/* =========================
   BOTONES LANDING
========================= */

.btnLanding{

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

color:white;

padding:14px 36px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.4);

margin:0 10px;

font-size:16px;

cursor:pointer;

transition:all 0.3s ease;

box-shadow:0px 5px 20px rgba(0,0,0,0.3);

}

/* =========================
   HOVER BOTONES
========================= */

.btnLanding:hover{

transform:translateY(-4px) scale(1.03);

background:rgba(255,255,255,0.25);

box-shadow:
0px 10px 30px rgba(0,180,255,0.35),
0px 0px 25px rgba(0,180,255,0.25);

}


/* =========================
   ANIMACIÓN DE ENTRADA
========================= */

.fadeLanding{
opacity:0;
transform:translateY(40px);
}

@keyframes fadeLanding{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0px);
}

}

/* =========================
   PANEL LATERAL LOGIN
========================= */

#panel{
position:fixed;
left:-360px;
top:0;

width:360px;
height:100%;

/* efecto vidrio */
background:rgba(255,255,255,0.4);
backdrop-filter:blur(12px);

transition:0.35s ease;

box-shadow:4px 0px 20px rgba(0,0,0,0.3);

padding:40px;
}

#panel.activo{
left:0;
}


/* =========================
   BLUR DEL FONDO
========================= */

#blur{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

backdrop-filter:blur(6px);
background:rgba(0,0,0,0.3);

display:none;
}

#blur.activo{
display:block;
}


/* =========================
   ANIMACIÓN FONDO
========================= */

@keyframes fondoMovimiento{

0%{
background-position:60% 65%;
}

50%{
background-position:65% 60%;
}

100%{
background-position:60% 65%;
}

}

/* =========================
   TRANSICIÓN ENTRE PÁGINAS
========================= */

.pageFadeOut{
animation:pageFadeOut 0.4s ease forwards;
}

@keyframes pageFadeOut{

0%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(0.98);
}

}

/* =========================
   RESPONSIVE MOVIL
========================= */

@media (max-width:768px){

body{

/* enfoca el logo ATU */
background-position:70% center;

background-size:cover;

/* evita saltos del fondo en móvil */
animation:none;

}

/* panel login */
#panel{
width:85%;
left:-100%;
}

#panel.activo{
left:0;
}

}

/* =========================
   MÓVIL EN HORIZONTAL
========================= */

@media (max-width:768px) and (orientation:landscape){

body{
    display:block;          /* evita el bloqueo del flex */
    overflow-y:auto;        /* permite scroll */
    height:auto;
    padding:20px;
}

#panel{
    position:absolute;      /* permite que el panel se desplace */
    height:auto;
    min-height:100vh;
}

}

</style>

</head>

<body>

<!-- BOTON MENU -->

<button onclick="abrirPanel()"
style="position:absolute; left:30px; top:50%; transform:translateY(-50%); font-size:32px; color:white; cursor:pointer; background:none; border:none;">
☰
</button>


<!-- BOTONES PRINCIPALES -->

<div class="botonesLanding absolute bottom-24 w-full flex justify-center gap-4 flex-wrap fadeLanding">

<button onclick="irDashboard()" class="btnLanding">
Dashboard
</button>

<button onclick="irReportes()" class="btnLanding">
Reportes
</button>

</div>


<!-- BLUR -->

<div id="blur" onclick="cerrarPanel()"></div>


<!-- PANEL LOGIN -->

<div id="panel">

<div style="text-align:center; margin-bottom:30px;">

<img src="/static/landing/logo.png"
style="width:160px; margin:auto; display:block; margin-bottom:10px;">

<p style="font-size:14px; font-weight:500; color:#1f2937;">
Autoridad de Transporte Urbano<br>
para Lima y Callao
</p>

<h2 style="margin-top:20px; font-size:20px; font-weight:bold;">
Panel de Gestión
</h2>

</div>

<form id="loginForm">

<input id="email"
type="email"
placeholder="Correo electrónico"
required
class="w-full border border-gray-300 p-3 mb-4 rounded">

<input id="password"
type="password"
placeholder="Contraseña"
required
class="w-full border border-gray-300 p-3 mb-4 rounded">

<button type="submit"
class="w-full bg-slate-700 text-white p-3 rounded hover:bg-slate-800">

Ingresar

</button>

<div id="mensaje" class="text-red-600 mt-4 text-sm"></div>

</form>

</div>

<script src="/static/landing/landing.js"></script>

</body>

</html>
